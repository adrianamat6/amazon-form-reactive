<div class="product-form">
    <h2>Nuevo Producto </h2>
    
    <!-- 2. Vinculación clave: [formGroup] y (ngSubmit) sin pasar variables -->
    <form [formGroup]="productForm" (ngSubmit)="addProduct()">

        <div class="form-group">
            <label for="title">Título</label>
            <!-- Directiva ngModel (sin corchetes) y atributo name obligatorios -->
            <input type="text" id="title" formControlName="title" placeholder="Ej. Zapatillas Running" >
        </div>

        <div class="form-group">
            <label for="price">Precio</label>
            <input type="number" id="price" formControlName="price" placeholder="0.00" >
        </div>

        <div class="form-group">
            <label for="quantity">Cantidad</label>
            <input type="number" id="quantity" formControlName="quantity" placeholder="0" >
        </div>

        <button type="submit" class="btn-submit">Añadir producto</button>

    </form>
</div>
